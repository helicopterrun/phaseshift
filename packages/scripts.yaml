# scripts.yaml

script:

  # ══════════════════════════════════════════════════════════════════════════
  # Publish the correct setpoints for the current phase
  # ══════════════════════════════════════════════════════════════════════════
  - id: publish_mode_setpoints
    then:
      - lambda: |-
          std::string m = id(mode).state;
          float db, dp;
          if (m == "Ramp") {
            db = id(ramp_temp_setpoint_dynamic).state;
            dp = id(ramp_dwpt_setpoint_dynamic).state;
          } else if (m == "Plateau") {
            db = id(plateau_temp).state;
            dp = id(plateau_dewpoint).state;
          } else {
            db = id(hold_temp).state;
            dp = id(hold_dewpoint).state;
          }
          id(drybulb_setpoint).publish_state(db);
          id(dewpoint_setpoint).publish_state(dp);
      - button.press: submit_values

  # ══════════════════════════════════════════════════════════════════════════
  # Auto-advance phases by "pressing" mode switch buttons
  # ══════════════════════════════════════════════════════════════════════════
  - id: update_mode_from_elapsed
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(mode).state == "Ramp";'
              - lambda: 'return id(ramp_elapsed) >= id(ramp_duration_s).state;'
          then:
            - button.press: switch_to_plateau

      - if:
          condition:
            and:
              - lambda: 'return id(mode).state == "Plateau";'
              - lambda: 'return id(plateau_elapsed) >= id(plateau_duration_s).state;'
          then:
            - button.press: switch_to_hold

  # ══════════════════════════════════════════════════════════════════════════
  # Update circulation fan output
  # ══════════════════════════════════════════════════════════════════════════
  - id: update_circulation_fan
    mode: restart
    then:
      - component.update: circ_fan_command

  # ══════════════════════════════════════════════════════════════════════════
  # TEC driver initialization on boot
  # ══════════════════════════════════════════════════════════════════════════
  - id: ti_driver_startup
    then:
      - output.turn_off: nsleep_a
      - output.turn_off: nsleep_b
      - delay: 100ms
      - output.turn_on: p_mode
      - output.set_level:
          id: imode_a
          level: 0%
      - output.set_level:
          id: imode_b
          level: 0%
      - output.turn_on: nsleep_a
      - output.turn_on: nsleep_b
      - number.set:
          id: pwm_max_current_number
          value: ${default_max_current}
      - button.press: apply_current_settings
      - number.set:
          id: tec_pl_number
          value: 0.0
      - button.press: set_pwm

  # ══════════════════════════════════════════════════════════════════════════
  # Restore last phase and units on boot
  # ══════════════════════════════════════════════════════════════════════════
  - id: restore_mode
    then:
      - select.set:
          id: mode
          option: !lambda 'return id(last_mode);'

  # ══════════════════════════════════════════════════════════════════════════
  # Push current setpoints to controllers
  # ══════════════════════════════════════════════════════════════════════════
  - id: activate_setpoints
    then:
      - button.press: submit_values

  # ══════════════════════════════════════════════════════════════════════════
  # Temporary defrost cycle when icing detected
  # ══════════════════════════════════════════════════════════════════════════
  - id: defrost_cycle
    then:
      - logger.log: "Defrost cycle started"
      - lambda: 'id(is_defrosting) = true;'  # suspend cold_calc writes (see globals)
      - climate.control:
          id: pid_cold
          mode: HEAT_COOL
          target_temperature: 5°C
      - delay: 5min
      - logger.log: "Defrost complete, resuming normal cooling"
      - lambda: 'id(is_defrosting) = false;'
      - climate.control:
          id: pid_cold
          mode: COOL
          target_temperature: !lambda 'return id(cold_hs_setpoint).state;'

  # ══════════════════════════════════════════════════════════════════════════
  # Update all elapsed-time sensors
  # ══════════════════════════════════════════════════════════════════════════
  - id: update_elapsed_times
    then:
      - component.update: total_time_formatted
      - if:
          condition:
            lambda: 'return id(mode).state == "Ramp";'
          then:
            - component.update: ramp_time_elapsed
      - if:
          condition:
            lambda: 'return id(mode).state == "Plateau";'
          then:
            - component.update: plateau_time_elapsed
      - if:
          condition:
            lambda: 'return id(mode).state == "Hold";'
          then:
            - component.update: hold_time_elapsed
      - script.execute: update_dynamic_setpoints

  # ══════════════════════════════════════════════════════════════════════════
  # Update dynamic setpoints and republish current mode setpoints
  # ══════════════════════════════════════════════════════════════════════════
  - id: update_dynamic_setpoints
    then:
      - component.update: ramp_temp_setpoint_dynamic
      - component.update: ramp_dwpt_setpoint_dynamic
      - component.update: ramp_fan_speed_setpoint_dynamic
      - component.update: ramp_fan_modulation_setpoint_dynamic
      - if:
          condition:
            lambda: 'return id(mode).state == "Ramp";'
          then:
            - script.execute: publish_mode_setpoints
            - script.execute: activate_setpoints

  # ══════════════════════════════════════════════════════════════════════════
  # NEW: Centralized mode switching with timestamp management
  # ══════════════════════════════════════════════════════════════════════════
  - id: set_mode_with_timestamp
    parameters:
      mode: string
    then:
      - lambda: |-
          uint32_t now = id(sntp_time).now().timestamp;
          std::string prev = id(last_mode);
          std::string m = mode;  // Use the parameter directly!
          
          if (m == "Ramp" && id(cycle_start_timestamp) == 0) {
            id(cycle_start_timestamp) = now;
          }
          
          if (m != prev) {
            if (m == "Ramp") {
              id(ramp_start_timestamp) = now;
              ESP_LOGI("mode", "Switched to RAMP at %u", now);
            } else if (m == "Plateau") {
              id(plateau_start_timestamp) = now;
              ESP_LOGI("mode", "Switched to PLATEAU at %u", now);
            } else {
              id(hold_start_timestamp) = now;
              ESP_LOGI("mode", "Switched to HOLD at %u", now);
            }
          }
          
          id(last_mode) = m;
      - select.set:
          id: mode
          option: !lambda 'return mode;'
      - script.execute: publish_mode_setpoints
      - script.execute: update_circulation_fan

  # ══════════════════════════════════════════════════════════════════════════
  # Hot-side TEC safety guard (run every 2s from timing.yaml).
  # Tiers (thresholds = tec_hot_* substitutions):
  #   WARN   (>= warn_on)   : flag + log only, clears < warn_off (5 °C hyst)
  #   CUTOFF (>= cutoff_on) : force hot fan 100% + freeze TEC power at the
  #                           current level, clears < cutoff_off (5 °C hyst)
  #   FAULT  (>= fault)     : latch, disable TEC drive, manual reset required
  #   SENSOR LOSS           : 3 consecutive NaN reads latch the same fault
  # ══════════════════════════════════════════════════════════════════════════
  - id: tec_safety_check
    then:
      - lambda: |-
          float hot = id(hot_temp).state;

          if (isnan(hot)) {
            // Sensor loss: tolerate brief dropouts, latch after 3 in a row.
            if (id(hot_nan_count) < 255) id(hot_nan_count) += 1;
            if (id(hot_nan_count) >= 3 && !id(tec_fault_latched)) {
              id(tec_fault_latched) = true;
              ESP_LOGE("safety", "Hot-side sensor lost (%u consecutive NaN) - latching TEC fault",
                       id(hot_nan_count));
            }
            return;
          }
          id(hot_nan_count) = 0;

          // FAULT (latched) — highest priority.
          if (hot >= ${tec_hot_fault} && !id(tec_fault_latched)) {
            id(tec_fault_latched) = true;
            ESP_LOGE("safety", "Hot side %.1f C >= %d C - latching TEC fault", hot, ${tec_hot_fault});
          }

          // CUTOFF (non-latched, 5 C hysteresis). Capture ceiling on trip.
          if (!id(hot_cutoff_active) && hot >= ${tec_hot_cutoff_on}) {
            id(hot_cutoff_active) = true;
            id(tec_cutoff_ceiling) = id(tec_pl_number).state;
            ESP_LOGW("safety", "Hot side %.1f C >= %d C - CUTOFF: fan high, TEC frozen at %.2f",
                     hot, ${tec_hot_cutoff_on}, id(tec_cutoff_ceiling));
          } else if (id(hot_cutoff_active) && hot < ${tec_hot_cutoff_off}) {
            id(hot_cutoff_active) = false;
            id(tec_cutoff_ceiling) = 1.0f;
            ESP_LOGI("safety", "Hot side %.1f C < %d C - CUTOFF cleared", hot, ${tec_hot_cutoff_off});
          }

          // WARN (non-latched, log/flag only, 5 C hysteresis).
          if (!id(hot_warn_active) && hot >= ${tec_hot_warn_on}) {
            id(hot_warn_active) = true;
            ESP_LOGW("safety", "Hot side %.1f C >= %d C - WARN", hot, ${tec_hot_warn_on});
          } else if (id(hot_warn_active) && hot < ${tec_hot_warn_off}) {
            id(hot_warn_active) = false;
          }
      # Enforce: latched fault kills TEC drive every tick until reset.
      - if:
          condition:
            lambda: 'return id(tec_fault_latched);'
          then:
            - output.turn_off: nsleep_a
            - output.turn_off: nsleep_b
            - output.set_level: { id: pwm_a, level: 0 }
            - output.set_level: { id: pwm_b, level: 0 }
            - number.set: { id: tec_pl_number, value: 0.0 }
      # Force hot fan to 100% during CUTOFF or FAULT (low latency, independent
      # of hot_fan_speed's 10s cadence; hot_fan_speed also honors these flags).
      - if:
          condition:
            lambda: 'return id(hot_cutoff_active) || id(tec_fault_latched);'
          then:
            - output.set_level: { id: fan_hot, level: 1.0 }